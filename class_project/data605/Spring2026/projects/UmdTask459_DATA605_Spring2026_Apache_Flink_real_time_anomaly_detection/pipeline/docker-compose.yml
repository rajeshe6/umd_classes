services:
  influxdb:
    image: influxdb:2.7
    container_name: weather-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: weather-org
      DOCKER_INFLUXDB_INIT_BUCKET: weather-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: weather-token-123

  grafana:
    image: grafana/grafana
    container_name: weather-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb

  weather-app:
    build: .
    container_name: weather-anomaly-app
    env_file:
      - .env
    depends_on:
      - influxdb
    volumes:
      - ../logs:/app/logs
      - ../models:/app/models
      - ../data:/app/data
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data: